<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Tambah Data Lokasi</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
    }

    .container {
      margin: 20px;
      background-color: #fff;
      padding: 30px;
      border-radius: 4px;
      box-shadow: 0 0 0 1px #eee;
    }

    .title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .subtitle {
      font-size: 14px;
      color: #777;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 40px;
    }

    label {
      display: block;
      font-size: 14px;
      margin-bottom: 8px;
    }

    input[type="text"] {
      width: 100%;
      height: 40px;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 0 10px;
      font-size: 14px;
      outline: none;
    }

    .button-group {
      display: flex;
      justify-content: flex-end;
      gap: 15px;
    }

    .btn {
      min-width: 100px;
      height: 40px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }

    .btn-cancel {
      background-color: #fff;
      border: 1px solid #999;
      color: #333;
    }

    .btn-save {
      background-color: #2f86d6;
      border: none;
      color: #fff;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="title">Tambah Data Lokasi</div>
    <div class="subtitle">Isi Data Lokasi</div>

    <div class="form-group">
      <label>Nama Lokasi</label>
      <input type="text" />
    </div>

    <div class="button-group">
      <button class="btn btn-cancel">Batal</button>
      <button class="btn btn-save">Simpan</button>
    </div>
  </div>

</body>
</html>
