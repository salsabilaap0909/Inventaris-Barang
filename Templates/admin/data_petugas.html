<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Data Petugas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #e6e6e6;
      font-family: Arial, sans-serif;
    }
    .sidebar {
      width: 230px;
      height: 100vh;
      background: #2c3ebd;
      color: white;
      position: fixed;
      display: flex;
      flex-direction: column;
    }
    .logo {
      display: flex;
      align-items: center;
      padding: 20px;
      font-weight: bold;
      font-size: 18px;
    }
    .menu {
      flex: 1;
    }
    .menu-item {
      margin: 8px 15px;
      padding: 10px 15px;
      border-radius: 25px;
      display: flex;
      align-items: center;
      cursor: pointer;
    }
    .menu-item:hover {
      background: #4da3ff;
    }
    .menu-item.active {
      background: #1dd1a1;
      color: black;
    }
    .content {
      margin-left: 250px;
      padding: 30px;
    }
    .card-box {
      background: #f5f7fa;
      padding: 20px;
      border-radius: 10px;
    }
    .table thead {
      background: #dfe6eb;
    }
    .btn-edit {
      background: #f1c40f;
      border: none;
      font-size: 12px;
      padding: 4px 10px;
    }
    .btn-hapus {
      background: #e74c3c;
      color: white;
      border: none;
      font-size: 12px;
      padding: 4px 10px;
    }
    .admin {
      padding: 15px;
      display: flex;
      align-items: center;
    }
    .admin img {
      width: 40px;
      border-radius: 50%;
      margin-right: 10px;
    }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">
    <!-- SVG LOGO -->
    <svg width="40" height="40" viewBox="0 0 100 100" fill="none">
      <rect x="15" y="35" width="60" height="40" stroke="white" stroke-width="5"/>
      <polygon points="15,35 45,15 75,35" stroke="white" stroke-width="5" fill="none"/>
      <line x1="45" y1="15" x2="45" y2="75" stroke="white" stroke-width="5"/>
    </svg>
    <span class="ms-2">Inventaris Barang</span>
  </div>

  <div class="menu">
    <div class="menu-item">Dashboard</div>
    <div class="menu-item">Data Barang</div>
    <div class="menu-item">Kategori</div>
    <div class="menu-item">Laporan</div>
    <div class="menu-item">Lokasi</div>
    <div class="menu-item active">Petugas</div>
  </div>

  <div class="admin">
    <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
    <span>Admin</span>
  </div>
</div>

<!-- CONTENT -->
<div class="content">
  <h3><b>Data Petugas</b></h3>

  <div class="d-flex justify-content-between my-3">
    <input type="text" class="form-control w-50" placeholder="Cari Petugas....">
    <button class="btn btn-primary">+ Tambah Petugas</button>
  </div>

  <div class="card-box">
    <table class="table">
      <thead>
        <tr>
          <th>Id</th>
          <th>Nama Petugas</th>
          <th>Id Lokasi</th>
          <th>Nama Lokasi</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>1234</td>
          <td>Andi</td>
          <td>123</td>
          <td>Ruang A</td>
          <td>
            <button class="btn btn-edit">Edit</button>
            <button class="btn btn-hapus">Hapus</button>
          </td>
        </tr>
        <tr>
          <td>1234</td>
          <td>Andi</td>
          <td>123</td>
          <td>Ruang B</td>
          <td>
            <button class="btn btn-edit">Edit</button>
            <button class="btn btn-hapus">Hapus</button>
          </td>
        </tr>
        <tr>
          <td>1234</td>
          <td>Budi</td>
          <td>123</td>
          <td>Ruang A</td>
          <td>
            <button class="btn btn-edit">Edit</button>
            <button class="btn btn-hapus">Hapus</button>
          </td>
        </tr>
        <tr>
          <td>1234</td>
          <td>Angga</td>
          <td>123</td>
          <td>Ruang A</td>
          <td>
            <button class="btn btn-edit">Edit</button>
            <button class="btn btn-hapus">Hapus</button>
          </td>
        </tr>
        <tr>
          <td>1234</td>
          <td>Fani</td>
          <td>123</td>
          <td>Ruang B</td>
          <td>
            <button class="btn btn-edit">Edit</button>
            <button class="btn btn-hapus">Hapus</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

</body>
</html>
