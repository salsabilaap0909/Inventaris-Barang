<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Edit Data Kategori</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #e6e6e6;
      font-family: Arial, sans-serif;
    }
    .container-box {
      background: #f5f5f5;
      margin: 40px;
      padding: 40px;
      border-radius: 4px;
      height: 80vh;
    }
    h3 {
      font-weight: bold;
      margin-bottom: 5px;
    }
    .subtitle {
      color: #777;
      margin-bottom: 30px;
    }
    label {
      font-weight: 600;
      margin-bottom: 10px;
    }
    .form-control {
      height: 45px;
      border-radius: 6px;
    }
    .btn-group-custom {
      margin-top: 60px;
      display: flex;
      justify-content: flex-end;
      gap: 20px;
    }
    .btn-batal {
      border: 1px solid #999;
      background: #fff;
      padding: 10px 30px;
      border-radius: 6px;
    }
    .btn-simpan {
      background: #3b82f6;
      color: white;
      padding: 10px 30px;
      border-radius: 6px;
      border: none;
    }
  </style>
</head>
<body>

<div class="container-box">
  <h3>Edit Data Kategori</h3>
  <div class="subtitle">Edit/update data kategori</div>

  <div class="mb-3">
    <label>Nama Kategori</label>
    <input type="text" class="form-control">
  </div>

  <div class="btn-group-custom">
    <button class="btn-batal">Batal</button>
    <button class="btn-simpan">Simpan</button>
  </div>
</div>

</body>
</html>
