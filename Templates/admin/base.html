<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="d-flex">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <div>
            <!-- LOGO -->
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="white">
                    <path d="M12 2L2 7l10 5 10-5-10-5zm0 7L2 7v10l10 5 10-5V7l-10 2z"/>
                </svg>
                <div><b>Inventaris</b><br>Barang</div>
            </div>

            <!-- MENU -->
            <div class="menu">

                <a href="" class="">
                    <div class="icon-box">
                        <svg viewBox="0 0 24 24">
                            <path d="M3 13h8V3H3v10zm10 8h8V3h-8v18zM3 21h8v-6H3v6z"/>
                        </svg>
                    </div>
                    Dashboard
                </a>

                <a href="">
                    <div class="icon-box">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 2l10 5-10 5-10-5z"/>
                        </svg>
                    </div>
                    Data Barang
                </a>

                <a href="">
                    <div class="icon-box">
                        <svg viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </div>
                    Kategori
                </a>

                <a href="">
                    <div class="icon-box">
                        <svg viewBox="0 0 24 24">
                            <path d="M4 4h16v16H4z"/>
                        </svg>
                    </div>
                    Laporan
                </a>

                <a href="">
                    <div class="icon-box">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 2C8 2 5 5 5 9c0 5 7 13 7 13s7-8 7-13c0-4-3-7-7-7z"/>
                        </svg>
                    </div>
                    Lokasi
                </a>

                <a href="">
                    <div class="icon-box">
                        <svg viewBox="0 0 24 24">
                            <circle cx="12" cy="8" r="4"/>
                        </svg>
                    </div>
                    Petugas
                </a>

            </div>
        </div>

        <!-- ADMIN -->
        <div class="admin">
            <div class="admin-icon">👤</div>
            <div>Admin</div>
        </div>

    </div>

    <!-- CONTENT -->
    <div class="content">
        {% block content %}
        <!-- isi halaman -->
        {% endblock %}
    </div>

</div>

</body>
</html>
