<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Edit Data Barang</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f5f5f5;
        margin: 0;
        padding: 20px;
    }

    .container {
        background-color: #eaeaea;
        padding: 25px;
        width: 800px;
        margin: auto;
        border-radius: 4px;
    }

    .title {
        font-size: 22px;
        font-weight: bold;
        margin-bottom: 5px;
    }

    .subtitle {
        color: #666;
        margin-bottom: 20px;
        font-size: 14px;
    }

    label {
        display: block;
        margin-top: 15px;
        margin-bottom: 5px;
        font-size: 14px;
    }

    input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
        background-color: #f7f7f7;
        font-size: 14px;
    }

    .button-group {
        margin-top: 25px;
        text-align: right;
    }

    .btn {
        padding: 10px 20px;
        border-radius: 5px;
        border: 1px solid #999;
        font-size: 14px;
        cursor: pointer;
    }

    .btn-cancel {
        background-color: #e0e0e0;
        margin-right: 10px;
    }

    .btn-save {
        background-color: #2d8cf0;
        color: white;
        border: none;
    }
</style>
</head>
<body>

<div class="container">
    <div class="title">Edit Data Barang</div>
    <div class="subtitle">Edit/update data barang</div>

    <label>Nama Barang</label>
    <input type="text">

    <label>Kategori</label>
    <input type="text">

    <label>Lokasi</label>
    <input type="text">

    <label>Kondisi</label>
    <input type="text">

    <div class="button-group">
        <button class="btn btn-cancel">Batal</button>
        <button class="btn btn-save">Simpan</button>
    </div>
</div>

</body>
</html>
