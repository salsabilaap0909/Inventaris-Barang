<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #f2f2f2;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 1000px;
      height: 500px;
      background: #eaeaea;
      display: flex;
      overflow: hidden;
    }

    /* KIRI (SETENGAH LINGKARAN BESAR) */
    .left {
      width: 45%;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
    }

    .left::before {
      content: "";
      position: absolute;
      width: 800px;
      height: 800px;
      background: #2f3fb5;
      border-radius: 50%;
      left: -450px;
      top: 50%;
      transform: translateY(-50%);
    }

    .left-content {
      position: relative;
      z-index: 2;
      color: white;
      padding: 60px 40px;
    }

    .left-content h2 {
      font-weight: 600;
      margin-bottom: 25px;
      letter-spacing: 1px;
    }

    .left-content h4 {
      font-weight: 400;
      margin-bottom: 25px;
      line-height: 1.4;
    }

    .left-content p {
      font-size: 14px;
      line-height: 1.6;
    }

    /* KANAN */
    .right {
      width: 55%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .right h2 {
      margin-bottom: 30px;
      font-weight: 600;
      font-size: 28px;
    }

    .input-group {
      width: 60%;
      margin-bottom: 15px;
    }

    .input-group input {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 6px;
      background: #dcdcdc;
      outline: none;
      font-size: 14px;
    }

    .btn {
      width: 60%;
      padding: 12px;
      background: linear-gradient(to right, #4aa3df, #2c7ecf);
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      font-size: 16px;
    }

    .btn:hover {
      opacity: 0.9;
    }

  </style>
</head>
<body>

  <div class="container">

    <!-- KIRI -->
    <div class="left">
      <div class="left-content">
        <h2>WELCOME</h2>
        <h4>SISTEM INVENTARIS<br>BARANG</h4>
        <p>
          Kelola data barang, stok, transaksi,<br>
          dan laporan inventaris dengan<br>
          lebih mudah, cepat tergenair
        </p>
      </div>
    </div>

    <!-- KANAN -->
    <div class="right">

      <h2>Login Admin</h2>

      <div class="input-group">
        <input type="text" placeholder="Username">
      </div>

      <div class="input-group">
        <input type="password" placeholder="Password">
      </div>

      <button class="btn">Login</button>

    </div>

  </div>

</body>
</html>
